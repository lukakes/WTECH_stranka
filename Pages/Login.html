<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sticker Shop</title>

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
  />

  <link rel="stylesheet" href="/CSS/style.css" />
</head>
<body class="login-body">
  <header class="top-header">
    <h1 class="logo">Super nazov</h1>
    <div class="header-row">
      <div class="search-box">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" placeholder="Search the store" />
      </div>

      <div class="header-icons">
        <a href="#"><i class="fa-regular fa-user"></i></a>
        <a href="#" class="cart-icon">
          <i class="fa-solid fa-cart-shopping"></i>
          <span class="cart-count">0</span>
        </a>
      </div>
    </div>
  </header>

  <nav class="navbar">
    <a href="index.html">Home</a>
    <a href="/Pages/Products.html">Shop <i class="fa-solid fa-chevron-down nav-arrow"></i></a>
    <a href="AboutUS.html">About</a>
    <a href="Contact.html">Contact</a>
  </nav>

  <main class="login-page container">
    <div class="login-page-contents">
      <div class="login-page-header">
        <h1>Login</h1>
      </div>
      <div class="login-page-inputs">
        <div class="login-email-field">
          <input type="email" placeholder="Email" />
        </div>
        <div class="login-password-field">
          <input type="password" placeholder="Password" />
          <a href="#" class="forgot-password">Forgot password?</a>
        </div>
        <button class="btn">Log in</button>
      <div class="login-links">
        <a href="#">Create an account?</a>
        <a href="/Pages/index.html">Return to store</a>
      </div>
      </div>
    </div>
  </main>

  <footer>
  <div class="footer-content">
    <div class="footer-links">
      <h2>Footer</h2>
      <p>Link</p>
      <p>Link</p>
      <p>Link</p>
    </div>

    <div class="footer-socials">
      <a href="#"><img src="/images/facebook.png" alt="Facebook"></a>
      <a href="#"><img src="/images/instagram.png" alt="Instagram"></a>
      <a href="#"><img src="/images/twitter.png" alt="Twitter"></a>
    </div>
  </div>
</footer>
  
</body>
</html>
