<!DOCTYPE html>
<html lang="en">
<head>

          <i class="fa-solid fa-cart-shopping"></i>
          <span class="cart-count">0</span>
        </a>
      </div>
    </div>
  </header>

  <nav class="navbar">
    <a href="index.html">Home</a>
    <div class="dropdown">
        <a href="Products.html">Shop <i class="fa-solid fa-chevron-down nav-arrow"></i></a>
        <div class="dropdown-content">
            <div class="row">
                <div class="column">
                    <h3>Category 1</h3>
                    <a href="#">Link 1</a>
                    <a href="#">Link 2</a>
                    <a href="#">Link 3</a>
                </div>
                <div class="column">
                    <h3>Category 2</h3>
                    <a href="#">Link 1</a>
                    <a href="#">Link 2</a>
                    <a href="#">Link 3</a>
                </div>
                <div class="column">
                    <h3>Category 3</h3>
                    <a href="#">Link 1</a>
                    <a href="#">Link 2</a>
                    <a href="#">Link 3</a>
                </div>
                <div class="dropdown-image">
                    <img src="https://mkskimgmodrykonik.vshcdn.net/0Xv0iZlre0O_s1600x1600.jpg" alt="Pytajte sa odpoviem, Fidlibum som vsetko viem">
                    <p><a href="Contact.html">Pytajte sa</a> všetko viem, Fidlibum som všetko viem!</p>
                </div>
            </div>
            <div class="row">
                <a href="Products.html">See all products</a>
            </div>
        </div>
    </div>
    <a href="AboutUS.html">About</a>
    <a href="Contact.html">Contact</a>
  </nav>

  <main class="login-page container">
    <div class="login-page-contents">
      <div class="login-page-header">
        <h1>Login</h1>
      </div>
      <div class="login-page-inputs">
        <div class="login-email-field">
          <input type="email" placeholder="Email" />
        </div>
        <div class="login-password-field">
          <input type="password" placeholder="Password" />
          <a href="#" class="forgot-password">Forgot password?</a>
        </div>
        <button class="btn">Log in</button>
      <div class="login-links">
        <a href="Register.html">Create an account</a>
        <a href="index.html">Return to store</a>
      </div>
      </div>
    </div>
  </main>

  <footer>
  <div class="footer-content">
    <div class="footer-links">
      <h2>Footer</h2>
      <p>Link</p>
      <p>Link</p>
      <p>Link</p>
    </div>

    <div class="footer-socials">
      <a href="#"><img src="../images/facebook.png" alt="Facebook"></a>
      <a href="#"><img src="../images/instagram.png" alt="Instagram"></a>
      <a href="#"><img src="../images/twitter.png" alt="Twitter"></a>
    </div>
  </div>
</footer>
<script>
        const dropdown = document.querySelector('.dropdown');
        let closeTimer;

        dropdown.addEventListener('mouseenter', () => {
        clearTimeout(closeTimer);
        dropdown.classList.add('open');
        });

        dropdown.addEventListener('mouseleave', () => {
        closeTimer = setTimeout(() => {
            dropdown.classList.remove('open');
        }, 300);
        });
    </script>
</body>
</html>
