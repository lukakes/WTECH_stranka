<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sticker Shop</title>

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
  />

  <link rel="stylesheet" href="/CSS/style.css" />
</head>
<body>
  <header class="top-header">
    <h1 class="logo">Super nazov</h1>
    <div class="header-row">
      <div class="search-box">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" placeholder="Search the store" />
      </div>

      <div class="header-icons">
        <a href="/Pages/Login.html"><i class="fa-regular fa-user"></i></a>
        <a href="#" class="cart-icon">
          <i class="fa-solid fa-cart-shopping"></i>
          <span class="cart-count">0</span>
        </a>
      </div>
    </div>
  </header>

  <nav class="navbar">
    <a href="index.html">Home</a>
    <a href="/Pages/Products.html">Shop <i class="fa-solid fa-chevron-down nav-arrow"></i></a>
    <a href="AboutUS.html">About</a>
    <a href="Contact.html" class="active">Contact</a>
  </nav>

  <main class="about-page">
    <div class="breadcrumb">Home &gt; Contact</div>

    <section class="about-section">
      <h2>Contact us</h2>

      <div class="contact-form">
        <input type="text" placeholder="Name">
        <input type="email" placeholder="Email">
        <input type="text" placeholder="Phone">
        <textarea placeholder="Message"></textarea>
        <button class="btn">Send</button>
      </div>
    </section>
  </main>

  <footer>
    <div class="footer-content">
      <div class="footer-links">
        <h2>Footer</h2>
        <p>Link</p>
        <p>Link</p>
        <p>Link</p>
      </div>
      <div class="footer-socials">
        <a href="#"><img src="/images/facebook.png" alt="Facebook"></a>
        <a href="#"><img src="/images/instagram.png" alt="Instagram"></a>
        <a href="#"><img src="/images/twitter.png" alt="Twitter"></a>
      </div>
    </div>
  </footer>
</body>
</html>
